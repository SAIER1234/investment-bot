name: 每日投资报告

on:
  schedule:
    # 北京时间 21:00 (UTC+8) = UTC 13:00
    # 场外基金净值在18:00-21:00间陆续公布，21:00基本全部出来
    # 周一到周五运行
    - cron: "0 13 * * 1-5"
  workflow_dispatch:  # 允许手动触发测试

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行投资报告
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python -m src.main
